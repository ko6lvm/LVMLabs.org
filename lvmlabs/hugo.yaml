baseURL: https://labs.ko6lvm.org/
locale: en-us
title: LVMLabs

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Blog
      pageRef: /blog
      weight: 2
    - name: Hardware
      pageRef: /hardware
      weight: 3
    - name: Software
      pageRef: /software
      weight: 4
    - name: About
      pageRef: /about
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/ko6lvm/LVMLabs.org"
      params:
        icon: github
    - name: Theme Toggle
      params:
        type: theme-toggle
        label: false

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo-crop-italics.png
      dark: images/logo-crop-white-italics.png
      link: /
      width: 125
  footer:
    displayCopyright: false
    displayPoweredBy: false
  enableInlineShortcodes: true

markup:
  goldmark:
    renderer:
      unsafe: true